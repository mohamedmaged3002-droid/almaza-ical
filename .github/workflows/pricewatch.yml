name: Almaza price watch
on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC = 06:00 Africa/Cairo, daily
  workflow_dispatch:
    inputs:
      dry_run: { type: boolean, default: false }
permissions: { contents: write }
concurrency: { group: almaza-pricewatch, cancel-in-progress: false }
jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - name: Watch prices
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: 'samanoudi@bluekeys.co, maged@bluekeys.co, reservations@bluekeys.co, mfikry772007@gmail.com'
        run: ${{ inputs.dry_run && 'node pricewatch.js --dry-run' || 'node pricewatch.js' }}
      - name: Commit updated baseline
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/prices.json data/roster.json
          git diff --staged --quiet || git commit -m "chore: update Almaza price baseline"
          git push
